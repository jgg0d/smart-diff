<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Diff</title>
  <link rel="stylesheet" href="../styles/popup.css" />
</head>
<body>
  <div class="popup-shell">

    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <span class="logo-icon">⟨/⟩</span>
        <span class="logo-text">Smart<strong>Diff</strong></span>
      </div>
      <button class="btn-settings" id="btnSettings" title="Configurações">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- PR Status -->
    <section class="pr-status" id="prStatus">
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-label" id="statusLabel">Detectando página…</span>
      </div>
      <div class="pr-info" id="prInfo" style="display:none;">
        <span class="pr-badge">#<span id="prNumber">—</span></span>
        <span class="pr-name" id="prTitle">—</span>
      </div>
    </section>

    <!-- AI Provider Badge -->
    <div class="provider-row">
      <span class="provider-label">Provedor ativo:</span>
      <span class="provider-chip" id="providerChip">—</span>
    </div>

    <!-- Action -->
    <div class="action-area">
      <button class="btn-analyze" id="btnAnalyze" disabled>
        <span class="btn-inner">
          <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
          <span id="btnLabel">Analisar PR</span>
        </span>
        <span class="btn-loader" id="btnLoader" style="display:none;">
          <span class="spinner"></span>
        </span>
      </button>
    </div>

    <!-- Feedback message -->
    <div class="feedback" id="feedback" style="display:none;"></div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
